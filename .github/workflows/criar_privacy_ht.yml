name: Criar página Privacy Policy — HandyTested (one-shot)

on:
  workflow_dispatch:

jobs:
  criar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Criar página
        env:
          HT_WP_PASS: ${{ secrets.HT_WP_PASS }}
        run: python criar_privacy_ht.py
